<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad Oficial de Conejo Malo | Official Fan & PR Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
font-family:'Montserrat',sans-serif;
background:#0a0a12;
color:white;
overflow-x:hidden;
}

/* ===== PARALLAX BACKGROUND ORBS ===== */
.parallax-bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
overflow:hidden;
z-index:-1;
}
.orb{
position:absolute;
border-radius:50%;
filter:blur(140px);
opacity:0.45;
animation:float 18s infinite ease-in-out alternate;
}
.orb1{
width:600px;height:600px;
background:radial-gradient(circle,#ff0077,#330066);
top:5%;left:5%;
}
.orb2{
width:700px;height:700px;
background:radial-gradient(circle,#00c3ff,#002244);
bottom:5%;right:5%;
animation-duration:22s;
}
@keyframes float{
from{transform:translateY(0px) scale(1);}
to{transform:translateY(-80px) scale(1.1);}
}

/* ===== HERO ===== */
header{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
background:
linear-gradient(rgba(10,10,20,0.65),rgba(10,10,20,0.85)),
url('https://images.unsplash.com/photo-1523580494863-6f3031224c94?q=80&w=3840') center/cover no-repeat;
background-attachment:fixed;
}
.hero-content{max-width:1000px;}
.main-title{
font-family:'Playfair Display',serif;
font-size:56px;
margin-bottom:20px;
background:linear-gradient(90deg,#ffffff,#ffd700,#ff4da6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.global-title{font-size:28px;margin-bottom:20px;opacity:0.9;}
.hero-subtitle{font-size:20px;margin-bottom:50px;opacity:0.85;}
.cta{
padding:18px 60px;
border-radius:50px;
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;
text-decoration:none;
font-weight:700;
box-shadow:0 25px 60px rgba(255,0,150,0.6);
transition:0.3s;
}
.cta:hover{transform:translateY(-5px);}

section{padding:100px 20px;text-align:center;}
.container{max-width:1200px;margin:auto;}
h2{font-size:36px;margin-bottom:40px;}

input,textarea{
width:100%;
max-width:500px;
padding:15px;
margin:10px auto;
display:block;
border:none;
border-radius:10px;
background:#1f1f2e;
color:white;
}

button{
width:100%;
max-width:500px;
padding:15px;
margin:10px auto;
display:block;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;
font-weight:600;
cursor:pointer;
}

#dashboard{
display:none;
}

footer{
padding:40px;
background:#0a0a10;
text-align:center;
font-size:14px;
opacity:0.7;
}
</style>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
function googleTranslateElementInit() {
new google.translate.TranslateElement({
pageLanguage: 'en',
includedLanguages: 'en,es,de,fr,pt,ru,zh-CN,ja,ar'
}, 'google_translate_element');
}
</script>
</head>

<body>

<div class="parallax-bg">
<div class="orb orb1"></div>
<div class="orb orb2"></div>
</div>

<header>
<div class="hero-content">
<h1 class="main-title">Comunidad Oficial de Conejo Malo</h1>
<h2 class="global-title">Bad Bunny Global Fan Community</h2>
<p class="hero-subtitle">Premium Global Fan Membership & Official PR Enquiries Platform</p>
<a href="#auth" class="cta">Member Access</a>
</div>
</header>

<!-- AUTH SECTION -->
<section id="auth">
<h2>Member Login / Register</h2>
<input id="authEmail" type="email" placeholder="Enter Email">
<input id="authPassword" type="password" placeholder="Enter Password">
<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>Welcome Member</h2>
<p id="userEmail"></p>
<button id="logoutBtn">Logout</button>
</section>

<footer>
© 2026 Comunidad Oficial de Conejo Malo | Global Fan Community
</footer>

<div id="google_translate_element" style="position:fixed;bottom:20px;right:20px;"></div>

<!-- FIREBASE AUTH -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpFAL7wX__ee1bmbr25A81IBuWEnpq970",
  authDomain: "conejomalo-global.firebaseapp.com",
  projectId: "conejomalo-global",
  storageBucket: "conejomalo-global.firebasestorage.app",
  messagingSenderId: "886224291739",
  appId: "1:886224291739:web:f54c336ac7ea4e3512c33e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authSection = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const userEmailDisplay = document.getElementById("userEmail");

document.getElementById("registerBtn").addEventListener("click", () => {
const email = document.getElementById("authEmail").value;
const password = document.getElementById("authPassword").value;

createUserWithEmailAndPassword(auth, email, password)
.then(() => alert("Registration successful ✅"))
.catch(error => alert(error.message));
});

document.getElementById("loginBtn").addEventListener("click", () => {
const email = document.getElementById("authEmail").value;
const password = document.getElementById("authPassword").value;

signInWithEmailAndPassword(auth, email, password)
.then(() => alert("Login successful ✅"))
.catch(error => alert(error.message));
});

onAuthStateChanged(auth, (user) => {
if (user) {
authSection.style.display = "none";
dashboard.style.display = "block";
userEmailDisplay.textContent = "Logged in as: " + user.email;
} else {
authSection.style.display = "block";
dashboard.style.display = "none";
}
});

document.getElementById("logoutBtn").addEventListener("click", () => {
signOut(auth).then(() => alert("Logged out successfully ✅"));
});
</script>

</body>
</html>
