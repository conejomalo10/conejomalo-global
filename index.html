<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad Oficial de Conejo Malo | Official Fan & PR Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:'Montserrat',sans-serif;
color:white;
overflow-x:hidden;
background:linear-gradient(
135deg,
#0b1f3a 0%,
#002868 25%,
#012169 50%,
#003399 70%,
#bf0a30 85%,
#ffd700 100%
);
}

/* ===== HERO ===== */
header{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
background:
linear-gradient(rgba(5,8,18,0.82),rgba(5,8,18,0.92)),
url('https://images.unsplash.com/photo-1523580494863-6f3031224c94?q=80&w=3840') center/cover no-repeat;
}

.hero-content{
max-width:850px;
width:100%;
}

.main-title{
font-family:'Playfair Display',serif;
font-size:42px;
line-height:1.2;
margin-bottom:20px;
font-weight:700;
color:white;
text-shadow:0 6px 25px rgba(0,0,0,0.7);
}

.sub-title{
font-size:20px;
font-weight:600;
margin-bottom:20px;
color:#f0f0f0;
opacity:0.95;
}

.hero-subtitle{
font-size:16px;
margin-bottom:40px;
opacity:0.85;
line-height:1.6;
color:#dddddd;
}

/* ===== CTA ===== */
.cta{
display:inline-block;
padding:16px 50px;
border-radius:50px;
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;
text-decoration:none;
font-weight:600;
font-size:16px;
box-shadow:0 15px 40px rgba(255,0,150,0.4);
transition:0.3s ease;
}
.cta:hover{
transform:translateY(-3px);
box-shadow:0 20px 50px rgba(255,0,150,0.6);
}

/* ===== SECTIONS ===== */
section{
padding:80px 20px;
text-align:center;
}

h2{
font-size:28px;
margin-bottom:30px;
}

input,textarea{
width:100%;
max-width:500px;
padding:15px;
margin:10px auto;
display:block;
border:none;
border-radius:8px;
background:#1a1d2a;
color:white;
}

button{
width:100%;
max-width:500px;
padding:15px;
margin:10px auto;
display:block;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;
font-weight:600;
cursor:pointer;
}

#dashboard{display:none;}

footer{
padding:30px;
background:rgba(0,0,0,0.4);
text-align:center;
font-size:14px;
opacity:0.8;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
.main-title{font-size:34px;}
.sub-title{font-size:18px;}
.hero-subtitle{font-size:15px;}
.cta{width:85%;}
}
</style>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
function googleTranslateElementInit() {
new google.translate.TranslateElement({
pageLanguage: 'en',
includedLanguages: 'en,es,de,fr,pt,ru,zh-CN,ja,ar'
}, 'google_translate_element');
}
</script>
</head>

<body>

<header>
<div class="hero-content">

<h1 class="main-title">
Comunidad Oficial de Conejo Malo
</h1>

<h2 class="sub-title">
Bad Bunny Global Fan Community
</h2>

<p class="hero-subtitle">
Premium Global Fan Membership & Official PR Enquiries Platform
</p>

<a href="#auth" class="cta">Member Access</a>

</div>
</header>

<section id="auth">
<h2>Member Login / Register</h2>
<input id="authEmail" type="email" placeholder="Enter Email">
<input id="authPassword" type="password" placeholder="Enter Password">
<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>
</section>

<section id="dashboard">
<h2>Welcome Member</h2>
<p id="userEmail"></p>
<button id="logoutBtn">Logout</button>
</section>

<footer>
© 2026 Comunidad Oficial de Conejo Malo | Global Fan Community
</footer>

<div id="google_translate_element" style="position:fixed;bottom:20px;right:20px;"></div>

<!-- FIREBASE AUTH -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpFAL7wX__ee1bmbr25A81IBuWEnpq970",
  authDomain: "conejomalo-global.firebaseapp.com",
  projectId: "conejomalo-global",
  storageBucket: "conejomalo-global.firebasestorage.app",
  messagingSenderId: "886224291739",
  appId: "1:886224291739:web:f54c336ac7ea4e3512c33e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authSection = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const userEmailDisplay = document.getElementById("userEmail");

document.getElementById("registerBtn").addEventListener("click", () => {
const email = document.getElementById("authEmail").value;
const password = document.getElementById("authPassword").value;
createUserWithEmailAndPassword(auth, email, password)
.then(() => alert("Registration successful ✅"))
.catch(error => alert(error.message));
});

document.getElementById("loginBtn").addEventListener("click", () => {
const email = document.getElementById("authEmail").value;
const password = document.getElementById("authPassword").value;
signInWithEmailAndPassword(auth, email, password)
.then(() => alert("Login successful ✅"))
.catch(error => alert(error.message));
});

onAuthStateChanged(auth, (user) => {
if (user) {
authSection.style.display = "none";
dashboard.style.display = "block";
userEmailDisplay.textContent = "Logged in as: " + user.email;
} else {
authSection.style.display = "block";
dashboard.style.display = "none";
}
});

document.getElementById("logoutBtn").addEventListener("click", () => {
signOut(auth).then(() => alert("Logged out successfully ✅"));
});
</script>

</body>
</html>
