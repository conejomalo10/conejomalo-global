<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad Oficial de Conejo Malo | Official Fan & PR Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
font-family:'Montserrat',sans-serif;
background:#0a0a12;
color:white;
overflow-x:hidden;
}

/* FLOATING ORBS */
.parallax-bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
overflow:hidden;
z-index:-3;
}
.orb{
position:absolute;
border-radius:50%;
filter:blur(140px);
opacity:0.45;
animation:float 18s infinite ease-in-out alternate;
}
.orb1{
width:600px;height:600px;
background:radial-gradient(circle,#ff0077,#330066);
top:5%;left:5%;
}
.orb2{
width:700px;height:700px;
background:radial-gradient(circle,#00c3ff,#002244);
bottom:5%;right:5%;
animation-duration:22s;
}
@keyframes float{
from{transform:translateY(0px) scale(1);}
to{transform:translateY(-80px) scale(1.1);}
}

/* HERO */
header{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}
.hero-bg{
position:absolute;
top:-20%;
left:0;
width:100%;
height:140%;
background:
linear-gradient(rgba(10,10,20,0.65),rgba(10,10,20,0.85)),
url('https://images.unsplash.com/photo-1523580494863-6f3031224c94?q=80&w=3840') center/cover no-repeat;
z-index:-2;
}
.hero-glow{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center, rgba(255,0,120,0.25), transparent 70%);
z-index:-1;
}
.hero-overlay{
position:absolute;
bottom:-100px;
left:0;
width:100%;
height:300px;
background:linear-gradient(to top, #0a0a12 30%, transparent);
}
.hero-content{
position:relative;
z-index:2;
max-width:1000px;
padding:40px;
}
.main-title{
font-family:'Playfair Display',serif;
font-size:56px;
font-weight:700;
letter-spacing:2px;
margin-bottom:20px;
background:linear-gradient(90deg,#ffffff,#ffd700,#ff4da6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.global-title{font-size:28px;margin-bottom:20px;opacity:0.9;}
.hero-subtitle{font-size:20px;margin-bottom:50px;opacity:0.85;}
.cta{
padding:18px 60px;
border-radius:50px;
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;
text-decoration:none;
font-weight:700;
box-shadow:0 25px 60px rgba(255,0,150,0.6);
}

/* SECTIONS */
section{padding:100px 20px;text-align:center;}
.container{max-width:1000px;margin:auto;}
h2{font-size:36px;margin-bottom:40px;font-weight:700;}

/* AUTH FORM */
.auth-box{
max-width:400px;
margin:40px auto;
background:#151522;
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
input{
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:10px;
background:#1f1f2e;
color:white;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;
font-weight:600;
cursor:pointer;
margin-bottom:15px;
}
footer{
padding:40px;
background:#0a0a10;
text-align:center;
font-size:14px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="parallax-bg">
<div class="orb orb1"></div>
<div class="orb orb2"></div>
</div>

<header>
<div class="hero-bg"></div>
<div class="hero-glow"></div>
<div class="hero-overlay"></div>

<div class="hero-content">
<h1 class="main-title">Comunidad Oficial de Conejo Malo</h1>
<h2 class="global-title">Bad Bunny Global Fan Community</h2>
<p class="hero-subtitle">Premium Global Fan Membership & Official PR Enquiries Platform</p>
<a href="#auth" class="cta">Member Login</a>
</div>
</header>

<section id="auth">
<h2>Member Access</h2>
<div class="auth-box">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signUp()">Create Account</button>
</div>
</section>

<footer>
© 2026 Comunidad Oficial de Conejo Malo | Bad Bunny Global Fan Community
</footer>

<script>
window.addEventListener('scroll',()=>{
let scrollPosition=window.pageYOffset;
document.querySelector('.hero-bg').style.transform='translateY('+(scrollPosition*0.5)+'px)';
document.querySelector('.hero-glow').style.transform='translateY('+(scrollPosition*0.3)+'px)';
});
</script>

<!-- FIREBASE AUTH SYSTEM -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpFAL7wX__ee1bmbr25A81IBuWEnpq970",
  authDomain: "conejomalo-global.firebaseapp.com",
  projectId: "conejomalo-global",
  storageBucket: "conejomalo-global.appspot.com",
  messagingSenderId: "886224291739",
  appId: "1:886224291739:web:f54c336ac7ea4e3512c33e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signUp = function() {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth, email, password)
.then(() => alert("Account created successfully!"))
.catch((error) => alert(error.message));
};

window.login = function() {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)
.then(() => {
alert("Login successful!");
window.location.href = "dashboard.html";
})
.catch((error) => alert(error.message));
};
</script>

</body>
</html>
