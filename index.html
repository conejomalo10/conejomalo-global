<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad Oficial de Conejo Malo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;color:white;background:#050816;}
.section-wrapper{padding:60px 20px;display:flex;justify-content:center;}
.glass-card{
width:100%;
max-width:800px;
background:rgba(15,18,35,0.6);
backdrop-filter:blur(20px);
border-radius:20px;
padding:40px;
text-align:center;
}
input,textarea,button{
width:100%;
max-width:400px;
margin:10px auto;
padding:12px;
border:none;
border-radius:10px;
display:block;
}
button{
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;
font-weight:600;
cursor:pointer;
}
#dashboard{display:none;}
</style>
</head>

<body>

<section id="authSection" class="section-wrapper">
<div class="glass-card">
<h2>Member Login / Register</h2>
<input id="authEmail" type="email" placeholder="Enter Email">
<input id="authPassword" type="password" placeholder="Enter Password">
<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>
</div>
</section>

<section id="dashboard" class="section-wrapper">
<div class="glass-card">
<h2>Dashboard</h2>
<p id="userEmail"></p>
<p id="roleDisplay"></p>
<div id="adminPanel"></div>
<button id="logoutBtn">Logout</button>
</div>
</section>

<script type="module">

// ============================
// 🔥 FIREBASE IMPORTS
// ============================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


// ============================
// 🔥 YOUR REAL FIREBASE CONFIG
// ============================
const firebaseConfig = {
  apiKey: "AIzaSyDpFAL7wX__ee1bmbr25A81IBuWEnpq970",
  authDomain: "conejomalo-global.firebaseapp.com",
  projectId: "conejomalo-global",
  storageBucket: "conejomalo-global.firebasestorage.app",
  messagingSenderId: "886224291739",
  appId: "1:886224291739:web:f54c336ac7ea4e3512c33e",
  measurementId: "G-F07TTHFS7K"
};

// ============================
// 🔥 INITIALIZE FIREBASE
// ============================
const app = initializeApp(firebaseConfig);
const firebaseAuth = getAuth(app);
const db = getFirestore(app);

// ============================
// 🎯 ELEMENT REFERENCES
// ============================
const authSection = document.getElementById("authSection");
const dashboard = document.getElementById("dashboard");

const registerBtn = document.getElementById("registerBtn");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

const authEmail = document.getElementById("authEmail");
const authPassword = document.getElementById("authPassword");

// ============================
// 🟢 REGISTER
// ============================
registerBtn.onclick = async () => {
  try{
    const cred = await createUserWithEmailAndPassword(
      firebaseAuth,
      authEmail.value,
      authPassword.value
    );

    await setDoc(doc(db,"users",cred.user.uid),{
      email: authEmail.value,
      membership:"FREE",
      createdAt: new Date()
    });

    alert("Registered Successfully");

  }catch(error){
    alert(error.message);
  }
};

// ============================
// 🔵 LOGIN
// ============================
loginBtn.onclick = async () => {
  try{
    await signInWithEmailAndPassword(
      firebaseAuth,
      authEmail.value,
      authPassword.value
    );
  }catch(error){
    alert(error.message);
  }
};

// ============================
// 🔄 AUTH STATE LISTENER
// ============================
onAuthStateChanged(firebaseAuth, async (user)=>{
  if(user){

    authSection.style.display="none";
    dashboard.style.display="flex";

    document.getElementById("userEmail").innerText =
      "Logged in as: " + user.email;

    const userSnap = await getDoc(doc(db,"users",user.uid));
    if(userSnap.exists()){
      document.getElementById("roleDisplay").innerText =
        "Membership: " + userSnap.data().membership;
    }

    checkAdmin(user.uid);

  }else{
    authSection.style.display="flex";
    dashboard.style.display="none";
  }
});

// ============================
// 👑 ADMIN CHECK
// ============================
async function checkAdmin(uid){
  const adminDoc = await getDoc(doc(db,"admins",uid));
  if(adminDoc.exists()){
    document.getElementById("adminPanel").innerHTML =
      `<div>
        <h3>Admin Panel (${adminDoc.data().role})</h3>
       </div>`;
  }
}

// ============================
// 🔴 LOGOUT
// ============================
logoutBtn.onclick = ()=>signOut(firebaseAuth);

</script>

</body>
</html>
